<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅍ pi-eup — 韩语辅音</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['PingFang SC', 'Microsoft YaHei', 'system-ui', 'sans-serif'],
                        kr: ['Malgun Gothic', 'Dotum', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans min-h-screen">
<div class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-6">
        <a href="alphabet.html" class="text-sm text-blue-600 hover:text-blue-800 hover:underline">← 字母表</a>
    </div>

    <div class="mb-10">
        <div style="width:32px;height:3px;background:#1e3a5f;margin-bottom:16px;"></div>
        <div class="flex items-baseline gap-4">
            <span class="font-kr text-5xl font-bold text-blue-900" style="line-height:1;">ㅍ</span>
            <div>
                <div class="text-xl font-bold text-slate-800 tracking-wide">pi-eup</div>
                <div class="text-sm text-slate-400 mt-0.5">
                    激音，强送气，发 <span class="font-mono text-slate-600">[pʰ]</span>，作收音归并为 <span class="font-mono text-slate-600">[p̚]</span>
                    &ensp;·&ensp; 键盘 <kbd class="px-1.5 py-0.5 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">z</kbd>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-12">
        <h2 class="text-lg font-bold text-slate-900 border-l-4 border-blue-600 pl-3 mb-4 tracking-wide">ㅍ + 基础元音</h2>
        <div class="overflow-hidden bg-white shadow-sm ring-1 ring-slate-200 rounded-xl">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50 text-slate-700 text-xs uppercase font-semibold">
                    <tr>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">字母</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">发音</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[38%]">常用单词</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[22%]">含义</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[16%]">键盘输入</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 bg-white text-sm">
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">파</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">pa</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">파도</span><span class="text-xs text-slate-400 font-mono">(pa-do)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=파도&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">海浪 / 波浪</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">z</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">k</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">퍼</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">peo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">퍼즐</span><span class="text-xs text-slate-400 font-mono">(peo-jeul)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=퍼즐&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">拼图</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">z</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">j</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">포</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">po</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">포도</span><span class="text-xs text-slate-400 font-mono">(po-do)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=포도&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">葡萄</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">z</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">h</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">표</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">pyo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">표</span><span class="text-xs text-slate-400 font-mono">(pyo)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=표&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">票 / 标志 / 表格</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">z</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">y</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">푸</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">pu</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">푸르다</span><span class="text-xs text-slate-400 font-mono">(pu-reu-da)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=푸르다&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">蔚蓝 / 翠绿</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">z</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">n</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">피</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">pi</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">피아노</span><span class="text-xs text-slate-400 font-mono">(pi-a-no)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=피아노&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">钢琴</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">z</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">l</kbd></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
