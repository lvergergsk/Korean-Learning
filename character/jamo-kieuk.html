<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅋ ki-euk — 韩语学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../tailwind-config.js"></script>
    <link rel="stylesheet" href="../shared.css">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body class="bg-slate-950 text-slate-100 antialiased font-sans min-h-screen">
<div class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-6 flex items-center gap-2 text-sm">
        <a href="../index.html" class="text-slate-500 hover:text-slate-300 transition-colors">首页</a>
        <span class="text-slate-700">/</span>
        <a href="alphabet.html" class="text-slate-500 hover:text-slate-300 transition-colors">字母表</a>
    </div>

    <div class="mb-10">
        <div class="accent-bar"></div>
        <div class="flex items-baseline gap-4">
            <span class="font-kr text-5xl font-bold text-indigo-400" style="line-height:1;">ㅋ</span>
            <div>
                <div class="text-xl font-bold text-slate-100 tracking-wide">ki-euk</div>
                <div class="text-sm text-slate-400 mt-0.5">
                    激音，强送气，发 <span class="font-mono text-slate-400">[kʰ]</span>，作收音归并为 <span class="font-mono text-slate-400">[k̚]</span>
                    &ensp;·&ensp; 键盘 <kbd class="kbd-key">v</kbd>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-12">
        <h2 class="text-lg font-bold text-slate-100 border-l-4 border-indigo-500 pl-3 mb-4 tracking-wide">ㅋ + 基础元音</h2>
        <div class="overflow-hidden bg-slate-900 border border-slate-800 rounded-xl">
            <table class="min-w-full divide-y divide-slate-800">
                <thead class="bg-slate-800/50 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                    <tr>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">字母</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">发音</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[38%]">常用单词</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[22%]">含义</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[16%]">键盘输入</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800 bg-transparent text-sm">
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">카</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">ka</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">카메라</span><span class="text-xs text-slate-400 font-mono">(ka-me-ra)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=카메라&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">相机</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">k</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">커</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">keo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">커피</span><span class="text-xs text-slate-400 font-mono">(keo-pi)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=커피&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">咖啡</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">j</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">코</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">ko</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">코끼리</span><span class="text-xs text-slate-400 font-mono">(ko-kki-ri)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=코끼리&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">大象</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">h</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">쿠</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">ku</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">쿠키</span><span class="text-xs text-slate-400 font-mono">(ku-ki)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=쿠키&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">饼干 / Cookie</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">n</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">크</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">keu</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">크다</span><span class="text-xs text-slate-400 font-mono">(keu-da)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=크다&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">大 / 高</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">m</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">키</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">ki</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">키</span><span class="text-xs text-slate-400 font-mono">(ki)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=키&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">身高 / 按键</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">l</kbd></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
