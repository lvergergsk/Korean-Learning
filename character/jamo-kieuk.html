<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅋ ki-euk — 韩语辅音</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../tailwind-config.js"></script>
    <link rel="stylesheet" href="../shared.css">
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans min-h-screen">
<div class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-6">
        <a href="alphabet.html" class="text-sm text-blue-600 hover:text-blue-800 hover:underline">← 字母表</a>
    </div>

    <div class="mb-10">
        <div class="accent-bar"></div>
        <div class="flex items-baseline gap-4">
            <span class="font-kr text-5xl font-bold text-blue-900" style="line-height:1;">ㅋ</span>
            <div>
                <div class="text-xl font-bold text-slate-800 tracking-wide">ki-euk</div>
                <div class="text-sm text-slate-400 mt-0.5">
                    激音，强送气，发 <span class="font-mono text-slate-600">[kʰ]</span>，作收音归并为 <span class="font-mono text-slate-600">[k̚]</span>
                    &ensp;·&ensp; 键盘 <kbd class="px-1.5 py-0.5 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">v</kbd>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-12">
        <h2 class="text-lg font-bold text-slate-900 border-l-4 border-blue-600 pl-3 mb-4 tracking-wide">ㅋ + 基础元音</h2>
        <div class="overflow-hidden bg-white shadow-sm ring-1 ring-slate-200 rounded-xl">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50 text-slate-700 text-xs uppercase font-semibold">
                    <tr>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">字母</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">发音</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[38%]">常用单词</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[22%]">含义</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[16%]">键盘输入</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 bg-white text-sm">
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">카</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">ka</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">카메라</span><span class="text-xs text-slate-400 font-mono">(ka-me-ra)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=카메라&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">相机</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">k</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">커</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">keo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">커피</span><span class="text-xs text-slate-400 font-mono">(keo-pi)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=커피&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">咖啡</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">j</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">코</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">ko</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">코끼리</span><span class="text-xs text-slate-400 font-mono">(ko-kki-ri)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=코끼리&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">大象</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">h</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">쿠</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">ku</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">쿠키</span><span class="text-xs text-slate-400 font-mono">(ku-ki)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=쿠키&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">饼干 / Cookie</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">n</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">크</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">keu</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">크다</span><span class="text-xs text-slate-400 font-mono">(keu-da)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=크다&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">大 / 高</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">m</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">키</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">ki</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">키</span><span class="text-xs text-slate-400 font-mono">(ki)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=키&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">身高 / 按键</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">v</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">l</kbd></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
