<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㄴ ni-eun — 韩语辅音</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../tailwind-config.js"></script>
    <link rel="stylesheet" href="../shared.css">
</head>
<body class="bg-slate-950 text-slate-100 antialiased font-sans min-h-screen">
<div class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-6 flex items-center gap-2 text-sm">
        <a href="../index.html" class="text-slate-500 hover:text-slate-300 transition-colors">首页</a>
        <span class="text-slate-700">/</span>
        <a href="alphabet.html" class="text-slate-500 hover:text-slate-300 transition-colors">字母表</a>
    </div>

    <div class="mb-10">
        <div class="accent-bar"></div>
        <div class="flex items-baseline gap-4">
            <span class="font-kr text-5xl font-bold text-indigo-400" style="line-height:1;">ㄴ</span>
            <div>
                <div class="text-xl font-bold text-slate-100 tracking-wide">ni-eun</div>
                <div class="text-sm text-slate-400 mt-0.5">
                    各位置均发 <span class="font-mono text-slate-400">[n]</span>，作收音同样发 <span class="font-mono text-slate-400">[n]</span>
                    &ensp;·&ensp; 键盘 <kbd class="kbd-key">s</kbd>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-12">
        <h2 class="text-lg font-bold text-slate-100 border-l-4 border-indigo-500 pl-3 mb-4 tracking-wide">ㄴ + 基础元音</h2>
        <div class="overflow-hidden bg-slate-900 border border-slate-800 rounded-xl">
            <table class="min-w-full divide-y divide-slate-800">
                <thead class="bg-slate-800/50 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                    <tr>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">字母</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">发音</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[38%]">常用单词</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[22%]">含义</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[16%]">键盘输入</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800 bg-transparent text-sm">
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">나</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">na</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">나무</span><span class="text-xs text-slate-400 font-mono">(na-mu)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=나무&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">树木 / 木材</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">s</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">k</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">너</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">neo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">너무</span><span class="text-xs text-slate-400 font-mono">(neo-mu)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=너무&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">太 / 非常</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">s</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">j</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">녀</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">nyeo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">녀석</span><span class="text-xs text-slate-400 font-mono">(nyeo-seok)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=녀석&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">家伙 / 小子</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">s</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">u</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">노</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">no</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">노래</span><span class="text-xs text-slate-400 font-mono">(no-rae)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=노래&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">歌曲</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">s</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">h</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">누</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">nu</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">누구</span><span class="text-xs text-slate-400 font-mono">(nu-gu)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=누구&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">谁</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">s</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">n</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">느</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">neu</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">느낌</span><span class="text-xs text-slate-400 font-mono">(neu-kkim)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=느낌&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">感觉 / 感受</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">s</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">m</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">니</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">ni</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">니트</span><span class="text-xs text-slate-400 font-mono">(ni-teu)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=니트&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">针织品 / 毛衣</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">s</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">l</kbd></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
