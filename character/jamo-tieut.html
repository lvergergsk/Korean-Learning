<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅌ ti-eut — 韩语辅音</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../tailwind-config.js"></script>
    <link rel="stylesheet" href="../shared.css">
</head>
<body class="bg-slate-950 text-slate-100 antialiased font-sans min-h-screen">
<div class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-6">
        <a href="alphabet.html" class="text-sm text-indigo-400 hover:text-indigo-300 hover:underline">← 字母表</a>
    </div>

    <div class="mb-10">
        <div class="accent-bar"></div>
        <div class="flex items-baseline gap-4">
            <span class="font-kr text-5xl font-bold text-indigo-400" style="line-height:1;">ㅌ</span>
            <div>
                <div class="text-xl font-bold text-slate-100 tracking-wide">ti-eut</div>
                <div class="text-sm text-slate-400 mt-0.5">
                    激音，强送气，发 <span class="font-mono text-slate-400">[tʰ]</span>，作收音归并为 <span class="font-mono text-slate-400">[t̚]</span>
                    &ensp;·&ensp; 键盘 <kbd class="kbd-key">x</kbd>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-12">
        <h2 class="text-lg font-bold text-slate-100 border-l-4 border-indigo-500 pl-3 mb-4 tracking-wide">ㅌ + 基础元音</h2>
        <div class="overflow-hidden bg-slate-900 border border-slate-800 rounded-xl">
            <table class="min-w-full divide-y divide-slate-800">
                <thead class="bg-slate-800/50 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                    <tr>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">字母</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">发音</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[38%]">常用单词</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[22%]">含义</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[16%]">键盘输入</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800 bg-transparent text-sm">
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">타</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">ta</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">타다</span><span class="text-xs text-slate-400 font-mono">(ta-da)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=타다&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">乘坐 / 燃烧</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">x</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">k</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">터</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">teo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">터미널</span><span class="text-xs text-slate-400 font-mono">(teo-mi-neol)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=터미널&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">客运站 / 码头</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">x</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">j</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">토</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">to</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">토끼</span><span class="text-xs text-slate-400 font-mono">(to-kki)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=토끼&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">兔子</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">x</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">h</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">투</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">tu</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">투표</span><span class="text-xs text-slate-400 font-mono">(tu-pyo)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=투표&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">投票</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">x</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">n</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">트</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">teu</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">트럭</span><span class="text-xs text-slate-400 font-mono">(teu-reok)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=트럭&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">卡车</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">x</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">m</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">티</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">ti</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">티셔츠</span><span class="text-xs text-slate-400 font-mono">(ti-syeo-cheu)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=티셔츠&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">T恤</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">x</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">l</kbd></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
