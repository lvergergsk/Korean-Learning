<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅎ hi-eut — 韩语辅音</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../tailwind-config.js"></script>
    <link rel="stylesheet" href="../shared.css">
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans min-h-screen">
<div class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-6">
        <a href="alphabet.html" class="text-sm text-blue-600 hover:text-blue-800 hover:underline">← 字母表</a>
    </div>

    <div class="mb-10">
        <div class="accent-bar"></div>
        <div class="flex items-baseline gap-4">
            <span class="font-kr text-5xl font-bold text-blue-900" style="line-height:1;">ㅎ</span>
            <div>
                <div class="text-xl font-bold text-slate-800 tracking-wide">hi-eut</div>
                <div class="text-sm text-slate-400 mt-0.5">
                    发 <span class="font-mono text-slate-600">[h]</span>（类似英语 h），作收音时通常脱落或使后接辅音送气
                    &ensp;·&ensp; 键盘 <kbd class="px-1.5 py-0.5 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">g</kbd>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-12">
        <h2 class="text-lg font-bold text-slate-900 border-l-4 border-blue-600 pl-3 mb-4 tracking-wide">ㅎ + 基础元音</h2>
        <div class="overflow-hidden bg-white shadow-sm ring-1 ring-slate-200 rounded-xl">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50 text-slate-700 text-xs uppercase font-semibold">
                    <tr>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">字母</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">发音</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[38%]">常用单词</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[22%]">含义</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[16%]">键盘输入</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 bg-white text-sm">
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">하</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">ha</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">하늘</span><span class="text-xs text-slate-400 font-mono">(ha-neul)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=하늘&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">天空</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">g</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">k</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">허</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">heo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">허리</span><span class="text-xs text-slate-400 font-mono">(heo-ri)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=허리&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">腰部</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">g</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">j</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">호</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">ho</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">호랑이</span><span class="text-xs text-slate-400 font-mono">(ho-rang-i)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=호랑이&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">老虎</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">g</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">h</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">효</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">hyo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">효도</span><span class="text-xs text-slate-400 font-mono">(hyo-do)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=효도&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">孝道 / 孝顺</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">g</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">y</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">후</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">hu</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">후추</span><span class="text-xs text-slate-400 font-mono">(hu-chu)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=후추&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">黑胡椒</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">g</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">n</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">흐</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">heu</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">흐리다</span><span class="text-xs text-slate-400 font-mono">(heu-ri-da)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=흐리다&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">阴天 / 模糊</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">g</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">m</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-blue-900">히</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">hi</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-900">히어로</span><span class="text-xs text-slate-400 font-mono">(hi-eo-ro)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=히어로&op=translate" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-600">英雄 / Hero</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">g</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="px-2 py-1 bg-slate-100 border border-slate-300 rounded shadow-sm font-mono text-xs">l</kbd></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
