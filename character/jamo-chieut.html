<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅊ chi-eut — 韩语辅音</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../tailwind-config.js"></script>
    <link rel="stylesheet" href="../shared.css">
</head>
<body class="bg-slate-950 text-slate-100 antialiased font-sans min-h-screen">
<div class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-6">
        <a href="alphabet.html" class="text-sm text-indigo-400 hover:text-indigo-300 hover:underline">← 字母表</a>
    </div>

    <div class="mb-10">
        <div class="accent-bar"></div>
        <div class="flex items-baseline gap-4">
            <span class="font-kr text-5xl font-bold text-indigo-400" style="line-height:1;">ㅊ</span>
            <div>
                <div class="text-xl font-bold text-slate-100 tracking-wide">chi-eut</div>
                <div class="text-sm text-slate-400 mt-0.5">
                    激音，强送气，发 <span class="font-mono text-slate-400">[tɕʰ]</span>（类似英语 ch），作收音归并为 <span class="font-mono text-slate-400">[t̚]</span>
                    &ensp;·&ensp; 键盘 <kbd class="kbd-key">c</kbd>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-12">
        <h2 class="text-lg font-bold text-slate-100 border-l-4 border-indigo-500 pl-3 mb-4 tracking-wide">ㅊ + 基础元音</h2>
        <div class="overflow-hidden bg-slate-900 border border-slate-800 rounded-xl">
            <table class="min-w-full divide-y divide-slate-800">
                <thead class="bg-slate-800/50 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                    <tr>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">字母</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[12%]">发音</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[38%]">常用单词</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[22%]">含义</th>
                        <th scope="col" class="px-6 py-4 text-left tracking-wider w-[16%]">键盘输入</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800 bg-transparent text-sm">
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">차</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">cha</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">차</span><span class="text-xs text-slate-400 font-mono">(cha)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=차&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">汽车 / 茶</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">c</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">k</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">처</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">cheo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">처음</span><span class="text-xs text-slate-400 font-mono">(cheo-eum)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=처음&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">第一次 / 初次</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">c</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">j</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">쳐</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">chyeo</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">쳐다보다</span><span class="text-xs text-slate-400 font-mono">(chyeo-da-bo-da)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=쳐다보다&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">注视 / 盯着看</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">c</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">u</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">초</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">cho</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">초콜릿</span><span class="text-xs text-slate-400 font-mono">(cho-kol-lit)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=초콜릿&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">巧克力</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">c</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">h</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">추</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">chu</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">추다</span><span class="text-xs text-slate-400 font-mono">(chu-da)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=춤추다&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">跳舞</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">c</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">n</kbd></td>
                    </tr>
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-kr text-3xl font-bold text-indigo-400">치</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-400">chi</td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center space-x-2"><span class="font-kr text-base font-semibold text-slate-100">치마</span><span class="text-xs text-slate-400 font-mono">(chi-ma)</span><a href="https://translate.google.com/?sl=ko&tl=zh-CN&text=치마&op=translate" target="_blank" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline font-medium">发音</a></div></td>
                        <td class="px-6 py-4 text-slate-400">裙子</td>
                        <td class="px-6 py-4 whitespace-nowrap"><kbd class="kbd-key">c</kbd><span class="text-slate-400 mx-1 text-xs">+</span><kbd class="kbd-key">l</kbd></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
